<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAYULOG — Sistem Catatan Kayu Borongan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{
  --forest-dark:#152A1F;
  --forest:#1F4531;
  --forest-mid:#2E5B3F;
  --bark:#4A3728;
  --sawdust:#EDE3CC;
  --sawdust-light:#F8F3E7;
  --sawdust-card:#FFFDF8;
  --orange:#C1621F;
  --orange-dark:#9B4C16;
  --amber:#B8860B;
  --ink:#221D14;
  --ink-soft:#5B5445;
  --line:#DCD2B8;
  --danger:#A63A3A;
  --success:#3F7A4E;
  --radius:10px;
  --font-display:'Oswald',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--font-body);
  background:var(--sawdust);
  color:var(--ink);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,.display{font-family:var(--font-display);text-transform:uppercase;letter-spacing:0.03em;}
.mono{font-family:var(--font-mono);}
button{font-family:var(--font-body);cursor:pointer;}
a{color:inherit;}
::selection{background:var(--orange);color:#fff;}

/* ring texture */
.ring-mark{display:inline-block;}
.ring-mark svg{display:block;}

/* Layout wrapper */
#app{min-height:100vh;}

/* ---------- LOGIN ---------- */
.auth-shell{
  display:flex;min-height:100vh;
}
.auth-brand{
  flex:1.1;
  background:var(--forest-dark);
  color:var(--sawdust-light);
  display:flex;flex-direction:column;justify-content:space-between;
  padding:56px 56px;
  position:relative;
  overflow:hidden;
}
.auth-brand .rings-bg{
  position:absolute;right:-120px;bottom:-120px;opacity:0.16;
}
.auth-brand-top{position:relative;z-index:2;display:flex;align-items:center;gap:14px;}
.auth-brand-top .logotext{font-family:var(--font-display);font-size:22px;letter-spacing:0.08em;}
.auth-brand-mid{position:relative;z-index:2;max-width:420px;}
.auth-brand-mid h1{font-size:44px;line-height:1.08;margin:0 0 18px 0;color:#fff;}
.auth-brand-mid p{font-size:15px;line-height:1.6;color:#CFCBAF;margin:0;}
.auth-brand-bottom{position:relative;z-index:2;display:flex;gap:28px;font-size:13px;color:#A9A48A;}
.auth-brand-bottom b{color:var(--sawdust-light);font-family:var(--font-mono);font-size:18px;display:block;}

.auth-form-wrap{
  flex:1;background:var(--sawdust-light);
  display:flex;align-items:center;justify-content:center;
  padding:40px;
}
.auth-form{width:100%;max-width:380px;}
.auth-tabs{display:flex;gap:6px;margin-bottom:28px;background:var(--sawdust);padding:4px;border-radius:var(--radius);}
.auth-tab{flex:1;text-align:center;padding:10px 0;border:none;background:transparent;border-radius:7px;font-weight:600;font-size:13px;letter-spacing:0.03em;color:var(--ink-soft);transition:all .15s;}
.auth-tab.active{background:var(--forest-dark);color:#fff;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:6px;letter-spacing:0.02em;}
.field input,.field select,.field textarea{
  width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:8px;
  background:#fff;font-size:14px;color:var(--ink);font-family:var(--font-body);
}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--forest-mid);box-shadow:0 0 0 3px rgba(46,91,63,0.12);}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:12px 20px;border-radius:8px;border:none;font-weight:600;font-size:14px;
  transition:transform .1s, opacity .15s;
}
.btn:active{transform:scale(0.98);}
.btn-primary{background:var(--forest-dark);color:#fff;width:100%;}
.btn-primary:hover{background:var(--forest);}
.btn-orange{background:var(--orange);color:#fff;}
.btn-orange:hover{background:var(--orange-dark);}
.btn-outline{background:transparent;border:1px solid var(--line);color:var(--ink);}
.btn-outline:hover{border-color:var(--ink-soft);}
.btn-danger{background:transparent;border:1px solid var(--danger);color:var(--danger);}
.btn-danger:hover{background:var(--danger);color:#fff;}
.btn-sm{padding:7px 12px;font-size:12px;border-radius:6px;}
.btn-block{width:100%;}
.auth-msg{font-size:13px;color:var(--danger);margin-top:4px;min-height:16px;}
.auth-hint{margin-top:18px;font-size:12px;color:var(--ink-soft);line-height:1.6;background:#fff;border:1px solid var(--line);border-radius:8px;padding:12px 14px;}
.auth-hint b{color:var(--ink);}

/* ---------- DASHBOARD SHELL ---------- */
.dash-shell{display:flex;min-height:100vh;}
.sidebar{
  width:230px;background:var(--forest-dark);color:var(--sawdust-light);
  display:flex;flex-direction:column;flex-shrink:0;
  padding:24px 0;
}
.side-brand{display:flex;align-items:center;gap:10px;padding:0 20px 22px;border-bottom:1px solid rgba(255,255,255,0.08);margin-bottom:10px;}
.side-brand .logotext{font-family:var(--font-display);font-size:17px;letter-spacing:0.06em;}
.side-user{padding:14px 20px;display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.side-avatar{width:34px;height:34px;border-radius:50%;background:var(--forest-mid);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;}
.side-user-name{font-size:13px;font-weight:600;line-height:1.3;}
.side-user-role{font-size:11px;color:#A9A48A;}
.side-nav{flex:1;padding:8px 12px;}
.side-link{
  display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:7px;
  font-size:13px;font-weight:500;color:#C9C4A9;margin-bottom:2px;border:none;background:transparent;width:100%;text-align:left;
}
.side-link:hover{background:rgba(255,255,255,0.06);color:#fff;}
.side-link.active{background:var(--orange);color:#fff;}
.side-link svg{flex-shrink:0;}
.side-foot{padding:12px 12px;border-top:1px solid rgba(255,255,255,0.08);}

.main{flex:1;overflow-x:hidden;}
.topbar{
  background:var(--sawdust-light);border-bottom:1px solid var(--line);
  padding:18px 32px;display:flex;justify-content:space-between;align-items:center;
}
.topbar h2{margin:0;font-size:20px;color:var(--ink);}
.topbar .sub{font-size:12px;color:var(--ink-soft);margin-top:2px;font-family:var(--font-body);text-transform:none;letter-spacing:0;}
.content{padding:28px 32px;max-width:1180px;}

.cards-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px;}
.stat-card{background:var(--sawdust-card);border:1px solid var(--line);border-radius:12px;padding:18px 20px;}
.stat-card .label{font-size:12px;color:var(--ink-soft);font-weight:600;letter-spacing:0.02em;text-transform:uppercase;}
.stat-card .value{font-family:var(--font-mono);font-size:24px;font-weight:600;margin-top:8px;color:var(--ink);}
.stat-card .value.orange{color:var(--orange-dark);}
.stat-card .value.green{color:var(--success);}

.panel{background:var(--sawdust-card);border:1px solid var(--line);border-radius:12px;padding:22px 24px;margin-bottom:22px;}
.panel-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.panel-head h3{margin:0;font-size:15px;color:var(--ink);}

.cat-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.cat-icon{width:32px;height:32px;border-radius:8px;background:var(--sawdust);display:flex;align-items:center;justify-content:center;color:var(--orange-dark);flex-shrink:0;}
.cat-bar-wrap{flex:1;}
.cat-bar-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;color:var(--ink-soft);}
.cat-bar-label b{color:var(--ink);font-family:var(--font-mono);}
.cat-bar-track{height:8px;background:var(--sawdust);border-radius:4px;overflow:hidden;}
.cat-bar-fill{height:100%;background:var(--orange);border-radius:4px;}

table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:10px 12px;color:var(--ink-soft);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.03em;border-bottom:1px solid var(--line);}
td{padding:11px 12px;border-bottom:1px solid var(--line);color:var(--ink);}
tr:last-child td{border-bottom:none;}
.tag{display:inline-flex;align-items:center;gap:6px;padding:4px 9px;border-radius:6px;font-size:11px;font-weight:600;background:var(--sawdust);color:var(--ink-soft);}
.amount{font-family:var(--font-mono);font-weight:600;}
.filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.filters select,.filters input{padding:8px 12px;border:1px solid var(--line);border-radius:7px;font-size:13px;background:#fff;}
.empty-state{text-align:center;padding:40px 20px;color:var(--ink-soft);}
.empty-state svg{opacity:0.35;margin-bottom:10px;}
.empty-state p{font-size:13px;margin:4px 0 0;}

.emp-list{display:flex;flex-direction:column;gap:10px;}
.emp-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--line);border-radius:9px;background:#fff;}
.emp-row:hover{border-color:var(--forest-mid);cursor:pointer;}
.emp-row.selected{border-color:var(--orange);background:#FFF8EE;}
.ring-avatar{width:38px;height:38px;flex-shrink:0;}
.emp-info{flex:1;min-width:0;}
.emp-name{font-weight:600;font-size:13px;color:var(--ink);}
.emp-meta{font-size:11px;color:var(--ink-soft);margin-top:2px;}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;}
.dot.online{background:var(--success);}
.dot.stale{background:var(--amber);}
.dot.offline{background:#B0AA8F;}

#map{height:380px;width:100%;border-radius:9px;z-index:1;}
.map-layout{display:flex;gap:16px;}
.map-side{width:260px;flex-shrink:0;max-height:380px;overflow-y:auto;}
.map-main{flex:1;}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-grid .full{grid-column:1/-1;}
.cat-choice{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px;}
.cat-choice label{display:flex;align-items:center;gap:10px;padding:12px;border:1.5px solid var(--line);border-radius:9px;cursor:pointer;font-size:13px;font-weight:500;background:#fff;}
.cat-choice input{display:none;}
.cat-choice label.picked{border-color:var(--orange);background:#FFF8EE;color:var(--orange-dark);}
.cat-choice .cat-icon{background:var(--sawdust);}
.cat-choice label.picked .cat-icon{background:var(--orange);color:#fff;}

.toast{
  position:fixed;bottom:24px;right:24px;background:var(--forest-dark);color:#fff;
  padding:13px 18px;border-radius:8px;font-size:13px;font-weight:500;z-index:999;
  box-shadow:0 8px 24px rgba(0,0,0,0.2);max-width:320px;
  display:flex;align-items:center;gap:10px;
}
.toast.danger{background:var(--danger);}
.toast.success{background:var(--success);}

.loc-hero{display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
.loc-status{flex:1;min-width:220px;}
.loc-status .big{font-family:var(--font-mono);font-size:15px;color:var(--ink);margin-top:4px;}
.badge-ago{display:inline-block;margin-top:6px;font-size:11px;padding:3px 9px;border-radius:6px;background:var(--sawdust);color:var(--ink-soft);}

@media (max-width:900px){
  .auth-brand{display:none;}
  .dash-shell{flex-direction:column;}
  .sidebar{width:100%;flex-direction:row;align-items:center;padding:10px 12px;overflow-x:auto;}
  .side-brand,.side-user{display:none;}
  .side-nav{display:flex;padding:0;gap:4px;flex:none;}
  .side-link{white-space:nowrap;}
  .side-foot{padding:0 0 0 8px;border-top:none;}
  .content{padding:18px;}
  .map-layout{flex-direction:column;}
  .map-side{width:100%;}
  .form-grid,.cat-choice{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ============ ICONS ============ */
const ICONS = {

gergaji:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="7"/><path d="M12 5v-2M12 21v-2M19 12h2M3 12h2M17 7l1.4-1.4M5.6 18.4L7 17M17 17l1.4 1.4M5.6 5.6L7 7"/></svg>`,
tenaga:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="7" r="3.4"/><path d="M4.5 20c0-3.6 3.4-6.5 7.5-6.5s7.5 2.9 7.5 6.5"/></svg>`,

bensin:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 22V8l5-5h4l3 3v16"/><path d="M3 12h9"/><path d="M17 8h1a2 2 0 012 2v3.5a1.5 1.5 0 01-3 0"/></svg>`,
alat:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a4 4 0 105 5l-4 4-2-2-4 4a2 2 0 01-3-3l4-4-2-2 4-4a4 4 0 012 2z"/></svg>`,
uang:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="3"/><path d="M6 6v.01M18 18v.01"/></svg>`,
makan:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2v7a2 2 0 002 2h0a2 2 0 002-2V2M8 11v11M18 2c-2 2-3 4-3 7s1 3 3 3 0-5-3-7"/></svg>`,
tag:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20.6 12.6L12 21.2 2.8 12 11.4 3.4a2 2 0 011.4-.6H20a1 1 0 011 1v6.8a2 2 0 01-.4 1z"/><circle cx="15.5" cy="7.5" r="1.2" fill="currentColor" stroke="none"/></svg>`,
pin:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 21s7-6.5 7-12a7 7 0 10-14 0c0 5.5 7 12 7 12z"/><circle cx="12" cy="9" r="2.4"/></svg>`,
chart:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 19V10M12 19V5M20 19v-6"/></svg>`,
list:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>`,
users:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>`,
map:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 6l6-3 6 3 6-3v15l-6 3-6-3-6 3z"/><path d="M7 3v15M13 6v15"/></svg>`,

trash:`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0l-1 14a2 2 0 01-2 2H7a2 2 0 01-2-2L4 6"/></svg>`,
home:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>`,
loc2:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 21s7-6.5 7-12a7 7 0 10-14 0c0 5.5 7 12 7 12z"/><circle cx="12" cy="9" r="2.4"/></svg>`,
inbox:`<svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11L2 12v6a2 2 0 002 2h16a2 2 0 002-2v-6l-3.45-6.89A2 2 0 0016.76 4H7.24a2 2 0 00-1.79 1.11z"/></svg>`,
dompet:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 010-4h14v4"/><path d="M3 5v14a2 2 0 002 2h16v-5"/><path d="M18 12h.01"/><rect x="15" y="10" width="6" height="5" rx="1"/></svg>`,
log:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="6" r="4"/><circle cx="12" cy="6" r="1.4" fill="currentColor" stroke="none"/><rect x="2" y="14" width="20" height="7" rx="1.5"/><circle cx="6" cy="17.5" r="1.6"/><circle cx="18" cy="17.5" r="1.6"/></svg>`,
gedung:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21V9l7-5 7 5v12"/><path d="M17 21V13l4 2v6M9 21v-4h2v4M9 9h2M13 9h1M9 13h2M13 13h1"/></svg>`
};

function ringMark(size, seed){
  const s = size;
  const rings = [0.95,0.75,0.55,0.35,0.15];
  const colors = ['#EDE3CC','#C1621F','#EDE3CC','#C1621F','#F8F3E7'];
  let circles = rings.map((r,i)=>`<circle cx="${s/2}" cy="${s/2}" r="${(s/2)*r-1}" fill="none" stroke="${colors[i%colors.length]}" stroke-width="${s*0.035}"/>`).join('');
  return `<span class="ring-mark"><svg width="${s}" height="${s}" viewBox="0 0 ${s} ${s}">${circles}<circle cx="${s/2}" cy="${s/2}" r="${s*0.06}" fill="#C1621F"/></svg></span>`;
}

const DEFAULT_CATEGORIES = [
  {key:'truk', label:'Sewa Truk', iconKey:'truk'},
  {key:'gergaji', label:'Mesin Gergaji', iconKey:'gergaji'},
  {key:'tenaga', label:'Bayar Tenaga Kerja', iconKey:'tenaga'},
  {key:'lainnya', label:'Keperluan Lainnya', iconKey:'lainnya'},
];
const ICON_CHOICES = ['truk','gergaji','tenaga','bensin','alat','uang','makan','lainnya'];

function getCats(){ return STATE.categories && STATE.categories.length ? STATE.categories : DEFAULT_CATEGORIES; }
function catLabel(k){ const c = getCats().find(c=>c.key===k); return c ? c.label : k+' (dihapus)'; }
function catIcon(k){ const c = getCats().find(c=>c.key===k); return ICONS[c ? c.iconKey : 'lainnya'] || ICONS.lainnya; }
function slugify(s){
  return s.toLowerCase().trim().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'') || 'kategori';
}

/* ============ STATE ============ */
let STATE = {
  users: [],
  expenses: [],
  locations: {},
  capital: [],
  sales: [],
  currentUser: null,
  view: 'loading',
  authTab: 'login',
  adminTab: 'overview',
  userTab: 'overview',
  selectedEmp: null,
  filterEmp: 'all',
  filterCat: 'all',
  formCat: null,
  categories: [],
  newCatIcon: 'lainnya',
  saleEmp: 'none',
  mapObj: null,
};

function rupiah(n){
  n = Number(n)||0;
  return 'Rp ' + Math.round(n).toLocaleString('id-ID');
}
function timeAgo(ts){
  if(!ts) return 'Belum pernah';
  const s = Math.floor((Date.now()-ts)/1000);
  if(s<60) return 'Baru saja';
  if(s<3600) return Math.floor(s/60)+' menit lalu';
  if(s<86400) return Math.floor(s/3600)+' jam lalu';
  return Math.floor(s/86400)+' hari lalu';
}
function fmtDate(d){
  try{ return new Date(d).toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'}); }catch(e){ return d; }
}
function initials(name){
  if(!name) return '?';
  return name.trim().split(/\s+/).slice(0,2).map(w=>w[0].toUpperCase()).join('');
}

function toast(msg, type){
  const t = document.createElement('div');
  t.className = 'toast'+(type?' '+type:'');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>{ t.remove(); }, 3200);
}

/* ============ STORAGE ============ */
async function safeGet(key){
  try{
    const r = await window.storage.get(key, true);
    return r ? JSON.parse(r.value) : null;
  }catch(e){ return null; }
}
async function safeSet(key, value){
  try{
    await window.storage.set(key, JSON.stringify(value), true);
    return true;
  }catch(e){ toast('Gagal menyimpan data. Coba lagi.', 'danger'); return false; }
}

async function loadAll(){
  let users = await safeGet('kayulog-users');
  if(!users){
    users = [{username:'admin', password:'admin123', name:'Admin Utama', role:'admin'}];
    await safeSet('kayulog-users', users);
  }
  STATE.users = users;
  STATE.expenses = await safeGet('kayulog-expenses') || [];
  STATE.locations = await safeGet('kayulog-locations') || {};
  STATE.capital = await safeGet('kayulog-capital') || [];
  STATE.sales = await safeGet('kayulog-sales') || [];
  let cats = await safeGet('kayulog-categories');
  if(!cats || !cats.length){
    cats = DEFAULT_CATEGORIES.slice();
    await safeSet('kayulog-categories', cats);
  }
  STATE.categories = cats;
}
async function saveUsers(){ await safeSet('kayulog-users', STATE.users); }
async function saveExpenses(){ await safeSet('kayulog-expenses', STATE.expenses); }
async function saveLocations(){ await safeSet('kayulog-locations', STATE.locations); }
async function saveCategories(){ await safeSet('kayulog-categories', STATE.categories); }

/* ============ LOCATION ============ */
function shareLocation(){
  if(!navigator.geolocation){ toast('Perangkat tidak mendukung lokasi.', 'danger'); return; }
  const btn = document.getElementById('share-loc-btn');
  if(btn) btn.textContent = 'Mengambil lokasi...';
  navigator.geolocation.getCurrentPosition(async (pos)=>{
    STATE.locations[STATE.currentUser.username] = {
      lat: pos.coords.latitude,
      lng: pos.coords.longitude,
      accuracy: pos.coords.accuracy,
      ts: Date.now()
    };
    await saveLocations();
    render();
    toast('Lokasi dibagikan ke admin.', 'success');
  }, (err)=>{
    toast('Tidak bisa mengambil lokasi: izin ditolak atau tidak tersedia.', 'danger');
    if(btn) btn.innerHTML = ICONS.loc2 + ' Bagikan lokasi sekarang';
  }, {enableHighAccuracy:true, timeout:12000});
}

/* ============ MAP INIT ============ */
function initMapIfNeeded(){
  const mapEl = document.getElementById('map');
  if(!mapEl || typeof L === 'undefined') return;

  let markers = [];
  if(STATE.view === 'admin' && STATE.adminTab === 'locations'){
    const employees = STATE.users.filter(u=>u.role==='user');
    employees.forEach(u=>{
      const loc = STATE.locations[u.username];
      if(loc) markers.push({name:u.name, lat:loc.lat, lng:loc.lng, ts:loc.ts});
    });
  } else if(STATE.view === 'user' && STATE.userTab === 'lokasi'){
    const loc = STATE.locations[STATE.currentUser.username];
    if(loc) markers.push({name:STATE.currentUser.name, lat:loc.lat, lng:loc.lng, ts:loc.ts});
  }

  const center = markers.length ? [markers[0].lat, markers[0].lng] : [-6.9175, 107.6191];
  const map = L.map('map', {scrollWheelZoom:true}).setView(center, markers.length?12:9);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors', maxZoom:18
  }).addTo(map);

  const orangeIcon = L.divIcon({
    className: '', html: `<div style="background:#C1621F;width:16px;height:16px;border-radius:50%;border:3px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.4);"></div>`,
    iconSize:[16,16], iconAnchor:[8,8]
  });

  markers.forEach(m=>{
    L.marker([m.lat, m.lng], {icon:orangeIcon}).addTo(map)
      .bindPopup(`<b>${m.name}</b><br>${timeAgo(m.ts)}`);
  });

  if(STATE.view === 'admin' && STATE.selectedEmp){
    const loc = STATE.locations[STATE.selectedEmp];
    if(loc) map.setView([loc.lat, loc.lng], 14);
  }

  setTimeout(()=>{ map.invalidateSize(); }, 100);
}

/* ============ MASTER RENDER ============ */
function render(){
  const app = document.getElementById('app');
  let html = '';
  if(STATE.view === 'loading'){
    html = `<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--forest-dark);color:#fff;">${ringMark(48)}</div>`;
  } else if(STATE.view === 'login'){
    html = renderLogin();
  } else if(STATE.view === 'admin'){
    html = renderAdmin();
  } else if(STATE.view === 'user'){
    html = renderUser();
  }
  app.innerHTML = html;

  const needsMap = (STATE.view==='admin' && STATE.adminTab==='locations') || (STATE.view==='user' && STATE.userTab==='lokasi');
  if(needsMap){ initMapIfNeeded(); }
}

/* ============ INIT ============ */
(async function init(){
  await loadAll();
  STATE.view = 'login';
  render();
})();
